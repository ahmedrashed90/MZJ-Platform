name = "mzj-automation-scheduler"
main = "src/index.js"
compatibility_date = "2026-07-01"

[vars]
PLATFORM_AUTOMATION_CALLBACK_URL = "https://YOUR-PLATFORM-DOMAIN/api/internal/automation-job"

[[queues.producers]]
queue = "mzj-automation-jobs"
binding = "AUTOMATION_QUEUE"

[[queues.consumers]]
queue = "mzj-automation-jobs"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 20

# Add secret:
# npx wrangler secret put AUTOMATION_SCHEDULER_SECRET
