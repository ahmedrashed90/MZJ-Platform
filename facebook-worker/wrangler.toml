name = "mzj-facebook-automation-transport"
main = "src/index.js"
compatibility_date = "2026-07-22"
workers_dev = true

[vars]
PLATFORM_INBOUND_URL = "https://mzj-platform.vercel.app/api/integrations/facebook"
FB_GRAPH_API_VERSION = "v20.0"
MAX_MEDIA_BYTES = "52428800"

# Add secrets with:
# wrangler secret put MZJ_GATEWAY_SECRET
# wrangler secret put FB_VERIFY_TOKEN
# wrangler secret put FB_APP_SECRET
# wrangler secret put FB_PAGE_ACCESS_TOKEN
# Optional:
# wrangler secret put MANYCHAT_API_TOKEN
# wrangler secret put MANYCHAT_WEBHOOK_SECRET

# Recommended durable outbound idempotency binding:
# [[kv_namespaces]]
# binding = "FACEBOOK_SEND_IDEMPOTENCY_KV"
# id = "<cloudflare-kv-namespace-id>"
